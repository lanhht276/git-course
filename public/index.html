<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="So Sanh Gia">
  <meta name="theme-color" content="#FF6B35">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>So Sanh Gia Sieu Thi</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Input Screen -->
    <div id="input-screen">
      <div class="header">
        <h1>So Sanh Gia</h1>
        <p class="subtitle">Co.op Mart &bull; Emart &bull; Big C</p>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="item-input"
          placeholder="Nhap ten san pham (VD: sua tuoi, gao...)"
          autocomplete="off"
        >
        <button id="add-btn" class="btn-add">+</button>
      </div>

      <div class="list-section">
        <h3 id="list-title">Danh sach (0 san pham)</h3>
        <div id="item-list" class="item-list">
          <div class="empty-state" id="empty-state">
            Chua co san pham nao.<br>Nhap ten san pham va nhan + de them.
          </div>
        </div>
      </div>

      <button id="compare-btn" class="btn-compare" disabled>
        So Sanh Gia (0 san pham)
      </button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <div class="result-header">
        <button id="back-btn" class="btn-back">&larr; Quay lai</button>
        <h2>Ket Qua So Sanh</h2>
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Dang tim kiem gia...<br>Vui long doi trong giay lat</p>
      </div>

      <div id="error-view" class="error-view hidden">
        <p id="error-msg"></p>
        <button id="retry-btn" class="btn-retry">Thu lai</button>
      </div>

      <div id="results-content" class="hidden">
        <div id="summary-card" class="summary-card"></div>
        <h3 class="section-title">Chi Tiet Tung San Pham</h3>
        <div id="items-detail"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
